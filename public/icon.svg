<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7bc043" />
      <stop offset="100%" stop-color="#00915a" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72" />
      <stop offset="100%" stop-color="#0f2040" />
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="256" fill="#ffffff" />

  <!-- Outer Green Swoosh -->
  <path d="M140,120 C220,50 360,50 430,140 C480,210 480,320 420,400 C460,320 440,180 340,110 C280,70 190,80 140,120 Z" fill="#7bc043" />

  <!-- Inner Green Leaf -->
  <path d="M420,400 C380,450 280,480 200,450 C320,460 400,380 420,250 C400,320 350,380 280,400 C350,350 380,280 380,180 C420,250 440,330 420,400 Z" fill="url(#leafGrad)" />

  <!-- Blue Swoosh -->
  <path d="M400,430 C300,490 160,470 90,380 C40,310 40,200 90,130 C60,200 70,330 160,410 C220,460 320,460 400,430 Z" fill="url(#arrowGrad)" />

  <!-- Arrow -->
  <path d="M100,280 L180,180 L240,240 L330,140 L330,190 L240,290 L180,230 L120,310 Z" fill="url(#arrowGrad)" />
  <polygon points="330,140 280,130 350,100 360,170" fill="url(#arrowGrad)" />

  <!-- Buildings -->
  <rect x="220" y="280" width="15" height="40" fill="#00915a" />
  <rect x="240" y="250" width="20" height="70" fill="url(#arrowGrad)" />
  <rect x="265" y="270" width="15" height="50" fill="#00915a" />

  <!-- Wind Turbine -->
  <line x1="300" y1="240" x2="300" y2="320" stroke="#00915a" stroke-width="3" />
  <circle cx="300" cy="240" r="3" fill="#00915a" />
  <line x1="300" y1="240" x2="300" y2="215" stroke="#00915a" stroke-width="2" />
  <line x1="300" y1="240" x2="280" y2="255" stroke="#00915a" stroke-width="2" />
  <line x1="300" y1="240" x2="320" y2="255" stroke="#00915a" stroke-width="2" />
</svg>
